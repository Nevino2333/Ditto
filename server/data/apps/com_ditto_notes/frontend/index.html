<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ditto Notes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
    .toolbar h1 { font-size: 16px; color: #e94560; flex: 1; }
    .toolbar button { background: #0f3460; color: #e0e0e0; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
    .toolbar button:hover { background: #e94560; }

    .main { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 220px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; }
    .sidebar-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #0f3460; transition: background 0.1s; }
    .sidebar-item:hover { background: #0f3460; }
    .sidebar-item.active { background: #0f3460; border-left: 3px solid #e94560; }
    .sidebar-item .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-item .date { font-size: 11px; color: #888; margin-top: 2px; }

    .editor-area { flex: 1; display: flex; flex-direction: column; }
    .editor-tabs { display: flex; gap: 0; background: #16213e; border-bottom: 1px solid #0f3460; }
    .editor-tab { padding: 8px 20px; cursor: pointer; font-size: 13px; color: #888; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .editor-tab.active { color: #e94560; border-bottom-color: #e94560; }

    .editor-content { flex: 1; display: flex; }
    .editor-pane { flex: 1; position: relative; }
    .editor-pane textarea { width: 100%; height: 100%; background: #1a1a2e; color: #e0e0e0; border: none; padding: 16px; font-family: 'Consolas', 'Fira Code', monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; }
    .preview-pane { flex: 1; padding: 16px; overflow-y: auto; background: #1a1a2e; border-left: 1px solid #0f3460; }
    .preview-pane h1 { font-size: 22px; margin: 0 0 12px; color: #e94560; }
    .preview-pane h2 { font-size: 18px; margin: 16px 0 8px; color: #e94560; }
    .preview-pane h3 { font-size: 15px; margin: 12px 0 6px; }
    .preview-pane p { margin: 8px 0; line-height: 1.7; }
    .preview-pane code { background: #0f3460; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
    .preview-pane strong { color: #e94560; }
    .preview-pane ul { padding-left: 20px; margin: 8px 0; }
    .preview-pane li { margin: 4px 0; }
    .preview-pane blockquote { border-left: 3px solid #e94560; padding-left: 12px; color: #888; margin: 8px 0; }

    .empty-state { display: flex; align-items: center; justify-content: center; flex: 1; color: #555; font-size: 16px; }
    @media(max-width:768px){.sidebar{width:100%;max-width:100%;border-right:none;border-bottom:1px solid #0f3460;max-height:40vh;overflow-y:auto}.main{flex-direction:column}.editor-content{flex-direction:column}.editor-pane{flex:none;height:50%}.preview-pane{border-left:none;border-top:1px solid #0f3460;flex:none;height:50%}.toolbar{flex-wrap:wrap;gap:6px}.toolbar button{min-height:44px;padding:8px 14px}.editor-tab{padding:10px 16px;min-height:44px}}
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>📝 Ditto Notes</h1>
    <button onclick="createNote()">+ 新建</button>
    <button onclick="deleteNote()">删除</button>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar"></div>
    <div class="editor-area" id="editorArea">
      <div class="empty-state" id="emptyState">点击"新建"创建第一篇笔记</div>
      <div id="editorContainer" style="display:none; flex:1; flex-direction:column;">
        <div class="editor-tabs">
          <div class="editor-tab active" onclick="setMode('edit')" id="tabEdit">编辑</div>
          <div class="editor-tab" onclick="setMode('preview')" id="tabPreview">预览</div>
          <div class="editor-tab" onclick="setMode('split')" id="tabSplit">分屏</div>
        </div>
        <div class="editor-content">
          <div class="editor-pane" id="editPane">
            <textarea id="editor" oninput="onEdit()"></textarea>
          </div>
          <div class="preview-pane" id="previewPane" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let notes = JSON.parse(localStorage.getItem('ditto_notes') || '[]');
    let activeId = null;
    let mode = 'edit';

    function save() { localStorage.setItem('ditto_notes', JSON.stringify(notes)); }

    function createNote() {
      const note = { id: Date.now().toString(), title: '无标题笔记', content: '', updatedAt: new Date().toISOString() };
      notes.unshift(note);
      save();
      activeId = note.id;
      render();
    }

    function deleteNote() {
      if (!activeId) return;
      notes = notes.filter(n => n.id !== activeId);
      activeId = notes.length > 0 ? notes[0].id : null;
      save();
      render();
    }

    function selectNote(id) { activeId = id; render(); }

    function onEdit() {
      const note = notes.find(n => n.id === activeId);
      if (!note) return;
      note.content = document.getElementById('editor').value;
      note.title = note.content.split('\n')[0].replace(/^#+\s*/, '').trim() || '无标题笔记';
      note.updatedAt = new Date().toISOString();
      save();
      renderSidebar();
      if (mode === 'split' || mode === 'preview') renderPreview();
    }

    function setMode(m) {
      mode = m;
      document.getElementById('tabEdit').className = 'editor-tab' + (m === 'edit' ? ' active' : '');
      document.getElementById('tabPreview').className = 'editor-tab' + (m === 'preview' ? ' active' : '');
      document.getElementById('tabSplit').className = 'editor-tab' + (m === 'split' ? ' active' : '');
      document.getElementById('editPane').style.display = (m === 'preview') ? 'none' : 'block';
      document.getElementById('previewPane').style.display = (m === 'edit') ? 'none' : 'block';
      if (m !== 'edit') renderPreview();
    }

    function renderMarkdown(text) {
      if (!text) return '<p style="color:#555">开始输入...</p>';
      let html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      html = html.replace(/`(.*?)`/g, '<code>$1</code>');
      html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function renderPreview() {
      const note = notes.find(n => n.id === activeId);
      document.getElementById('previewPane').innerHTML = renderMarkdown(note?.content || '');
    }

    function renderSidebar() {
      document.getElementById('sidebar').innerHTML = notes.map(n =>
        `<div class="sidebar-item${n.id === activeId ? ' active' : ''}" onclick="selectNote('${n.id}')">
          <div class="title">${escHtml(n.title)}</div>
          <div class="date">${formatDate(n.updatedAt)}</div>
        </div>`
      ).join('');
    }

    function render() {
      renderSidebar();
      const note = notes.find(n => n.id === activeId);
      document.getElementById('emptyState').style.display = note ? 'none' : 'flex';
      document.getElementById('editorContainer').style.display = note ? 'flex' : 'none';
      if (note) {
        document.getElementById('editor').value = note.content;
        setMode(mode);
      }
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function formatDate(iso) { try { return new Date(iso).toLocaleDateString('zh-CN'); } catch { return iso; } }

    if (notes.length === 0) {
      notes.push({ id: '1', title: '欢迎使用 Ditto Notes', content: '# 欢迎使用 Ditto Notes\n\n这是一款轻量级 **Markdown** 笔记应用。\n\n## 功能\n\n- Markdown 编辑与实时预览\n- 分屏模式\n- 自动保存到本地\n\n> 数据存储在浏览器本地，保护你的隐私。', updatedAt: new Date().toISOString() });
      save();
      activeId = '1';
    } else {
      activeId = notes[0].id;
    }
    render();
  </script>
</body>
</html>
