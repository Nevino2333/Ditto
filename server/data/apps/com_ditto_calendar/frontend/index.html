<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditto Calendar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1b26;--bg2:#1f2035;--bg3:#252738;--bg4:#2a2c42;
  --accent:#7aa2f7;--accent2:#6a9cf7;--accent-dim:rgba(122,162,247,.12);
  --text:#c0caf5;--text2:#a9b1d6;--text3:#565f89;
  --red:#f7768e;--green:#9ece6a;--yellow:#e0af68;--purple:#bb9af7;--cyan:#7dcfff;--orange:#ff9e64;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,.35);
}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;user-select:none}
.app{display:flex;height:100vh}

.sidebar{width:220px;background:var(--bg2);border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;padding:20px 16px;gap:20px;flex-shrink:0}
.sidebar-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.sidebar-title span{font-size:20px}

.mini-month{background:var(--bg3);border-radius:var(--radius);padding:12px;overflow:hidden}
.mini-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mini-header span{font-size:12px;color:var(--text2);font-weight:600}
.mini-nav{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;transition:.15s}
.mini-nav:hover{color:var(--accent);background:var(--accent-dim)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center}
.mini-wd{font-size:9px;color:var(--text3);padding:2px 0;font-weight:600}
.mini-day{font-size:10px;padding:3px 0;border-radius:4px;cursor:pointer;transition:.15s;color:var(--text2)}
.mini-day:hover{background:var(--accent-dim);color:var(--accent)}
.mini-day.other{color:var(--text3);opacity:.4}
.mini-day.today{background:var(--accent);color:#1a1b26;font-weight:700}
.mini-day.selected{outline:2px solid var(--accent);outline-offset:-2px}
.mini-day.has-event::after{content:'';display:block;width:3px;height:3px;border-radius:50%;background:var(--accent);margin:1px auto 0}

.sidebar-section h3{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.color-tags{display:flex;flex-direction:column;gap:6px}
.color-tag{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s}
.color-tag:hover{background:var(--accent-dim)}
.color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid rgba(255,255,255,.04)}
.top-left{display:flex;align-items:center;gap:12px}
.month-label{font-size:22px;font-weight:700;color:var(--text)}
.month-label .year{color:var(--text3);font-weight:400;font-size:16px;margin-left:6px}
.nav-btn{background:var(--bg3);border:1px solid rgba(255,255,255,.06);color:var(--text2);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
.nav-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:rgba(122,162,247,.2)}
.today-btn{background:var(--accent);color:#1a1b26;border:none;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px}
.today-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(122,162,247,.3)}

.content{display:flex;flex:1;overflow:hidden}

.calendar-area{flex:1;padding:16px 24px;display:flex;flex-direction:column;overflow:hidden}
.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.weekday-cell{text-align:center;font-size:12px;font-weight:700;color:var(--text3);padding:6px 0;letter-spacing:.5px}
.weekday-cell.weekend{color:var(--red);opacity:.7}

.days-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:4px;flex:1}
.day-cell{background:var(--bg2);border-radius:8px;padding:6px 8px;cursor:pointer;transition:.2s;position:relative;display:flex;flex-direction:column;overflow:hidden;border:1px solid transparent}
.day-cell:hover{background:var(--bg3);border-color:rgba(255,255,255,.06);transform:translateY(-1px)}
.day-cell.other-month{opacity:.3}
.day-cell.other-month:hover{opacity:.5}
.day-cell.selected{border-color:var(--accent);background:var(--accent-dim)}
.day-cell.today .day-num{background:var(--accent);color:#1a1b26}
.day-num{font-size:13px;font-weight:600;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.15s;align-self:flex-start}
.day-cell.today .day-num{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(122,162,247,.4)}50%{box-shadow:0 0 0 6px rgba(122,162,247,0)}}
.event-dots{display:flex;gap:3px;margin-top:auto;padding-top:4px;flex-wrap:wrap}
.event-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.day-events-preview{display:flex;flex-direction:column;gap:1px;margin-top:2px;overflow:hidden}
.day-event-preview{font-size:8px;padding:1px 4px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500}

.event-panel{width:240px;background:var(--bg2);border-left:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panel-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.04)}
.panel-date{font-size:16px;font-weight:700;color:var(--text)}
.panel-weekday{font-size:12px;color:var(--text3);margin-top:2px}
.panel-add{width:100%;margin-top:12px;background:var(--accent-dim);border:1px dashed rgba(122,162,247,.3);color:var(--accent);padding:8px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.panel-add:hover{background:rgba(122,162,247,.2);border-color:var(--accent)}
.panel-list{flex:1;overflow-y:auto;padding:12px}
.panel-list::-webkit-scrollbar{width:4px}
.panel-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.no-events{text-align:center;color:var(--text3);font-size:12px;padding:24px 0}
.no-events span{font-size:28px;display:block;margin-bottom:8px}

.event-card{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative;border-left:3px solid var(--accent);transition:.2s;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.event-card:hover{background:var(--bg4)}
.event-card .ev-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.event-card .ev-time{font-size:11px;color:var(--text3)}
.event-card .ev-delete{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;opacity:0;transition:.15s;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.event-card:hover .ev-delete{opacity:1}
.event-card .ev-delete:hover{color:var(--red);background:rgba(247,118,142,.1)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:.25s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:24px;width:340px;box-shadow:var(--shadow);transform:scale(.92);transition:.25s}
.modal-overlay.active .modal{transform:scale(1)}
.modal h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:.3px}
.form-group input[type="text"],.form-group input[type="time"]{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;outline:none;transition:.2s;font-family:inherit}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-group input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(.7)}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-option{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:.2s;border:2px solid transparent;position:relative}
.color-option:hover{transform:scale(1.15)}
.color-option.active{border-color:#fff;box-shadow:0 0 0 2px var(--bg),0 0 0 4px currentColor}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;border:none;font-family:inherit}
.btn-cancel{background:var(--bg3);color:var(--text2)}
.btn-cancel:hover{background:var(--bg4);color:var(--text)}
.btn-save{background:var(--accent);color:#1a1b26}
.btn-save:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(122,162,247,.3)}

.slide-left{animation:slideLeft .3s ease}
.slide-right{animation:slideRight .3s ease}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:768px){.sidebar{display:none}.event-panel{position:fixed;bottom:0;left:0;right:0;width:100%;max-height:50vh;border-left:none;border-top:1px solid rgba(255,255,255,.04);border-radius:14px 14px 0 0;z-index:10;transform:translateY(100%);transition:transform .3s}.event-panel.open{transform:translateY(0)}.top-bar{padding:10px 14px}.month-label{font-size:18px}.month-label .year{font-size:14px}.calendar-area{padding:8px 10px}.weekday-cell{font-size:10px;padding:4px 0}.day-cell{padding:4px 5px;border-radius:6px}.day-num{font-size:11px;width:22px;height:22px}.event-dots{gap:2px}.event-dot{width:4px;height:4px}.day-events-preview{display:none}.nav-btn{width:38px;height:38px;min-height:44px;min-width:44px}.today-btn{min-height:44px}.panel-add{min-height:44px}.modal{width:calc(100% - 32px);max-width:340px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-title"><span>📅</span> Ditto Calendar</div>
    <div class="mini-month">
      <div class="mini-header">
        <button class="mini-nav" onclick="miniNav(-1)">◀</button>
        <span id="miniLabel"></span>
        <button class="mini-nav" onclick="miniNav(1)">▶</button>
      </div>
      <div class="mini-grid" id="miniGrid"></div>
    </div>
    <div class="sidebar-section">
      <h3>事件标签</h3>
      <div class="color-tags" id="colorTags"></div>
    </div>
  </aside>
  <div class="main">
    <div class="top-bar">
      <div class="top-left">
        <button class="nav-btn" onclick="navMonth(-1)">◀</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" onclick="navMonth(1)">▶</button>
      </div>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>
    <div class="content">
      <div class="calendar-area">
        <div class="weekday-row" id="weekdayRow"></div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
      <div class="event-panel">
        <div class="panel-header">
          <div class="panel-date" id="panelDate"></div>
          <div class="panel-weekday" id="panelWeekday"></div>
          <button class="panel-add" onclick="openModal()">＋ 添加事件</button>
        </div>
        <div class="panel-list" id="panelList"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>📝 新建事件</h2>
    <div class="form-group">
      <label>事件标题</label>
      <input type="text" id="evTitle" placeholder="输入事件名称..." maxlength="50">
    </div>
    <div class="form-group">
      <label>开始时间</label>
      <input type="time" id="evTime" value="09:00">
    </div>
    <div class="form-group">
      <label>标签颜色</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  {name:'蓝色',value:'#7aa2f7'},{name:'红色',value:'#f7768e'},
  {name:'绿色',value:'#9ece6a'},{name:'黄色',value:'#e0af68'},
  {name:'紫色',value:'#bb9af7'},{name:'青色',value:'#7dcfff'},
  {name:'橙色',value:'#ff9e64'}
];
const WEEKDAYS = ['周一','周二','周三','周四','周五','周六','周日'];
const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

let currentYear, currentMonth, selectedDate, miniYear, miniMonth;
let events = {};
let selectedColor = COLORS[0].value;

function loadEvents(){
  try{ events = JSON.parse(localStorage.getItem('ditto_cal_events')||'{}'); }catch(e){ events={}; }
}
function saveEvents(){
  localStorage.setItem('ditto_cal_events', JSON.stringify(events));
}
function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function isToday(y,m,d){ const t=new Date(); return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d; }

function init(){
  loadEvents();
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  miniYear = currentYear;
  miniMonth = currentMonth;
  selectedDate = dateKey(currentYear, currentMonth, now.getDate());
  buildWeekdays();
  buildColorPicker();
  buildColorTags();
  render();
}

function buildWeekdays(){
  const row = document.getElementById('weekdayRow');
  row.innerHTML = WEEKDAYS.map((w,i)=>`<div class="weekday-cell${i>=5?' weekend':''}">${w}</div>`).join('');
}

function buildColorPicker(){
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = COLORS.map(c=>
    `<div class="color-option${c.value===selectedColor?' active':''}" style="background:${c.value};color:${c.value}" data-color="${c.value}" onclick="pickColor(this,'${c.value}')"></div>`
  ).join('');
}

function buildColorTags(){
  const tags = document.getElementById('colorTags');
  tags.innerHTML = COLORS.map(c=>`<div class="color-tag"><div class="color-dot" style="background:${c.value}"></div>${c.name}</div>`).join('');
}

function pickColor(el, color){
  selectedColor = color;
  document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
}

function render(){
  renderCalendar();
  renderMiniMonth();
  renderPanel();
}

function renderCalendar(){
  const label = document.getElementById('monthLabel');
  label.innerHTML = `${MONTHS[currentMonth]}<span class="year">${currentYear}</span>`;

  const grid = document.getElementById('daysGrid');
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();

  let html = '';
  const totalCells = 42;

  for(let i=0; i<totalCells; i++){
    let day, month, year, other = false;
    if(i < offset){
      day = prevDays - offset + i + 1;
      month = currentMonth - 1;
      year = currentYear;
      if(month < 0){ month = 11; year--; }
      other = true;
    } else if(i >= offset + daysInMonth){
      day = i - offset - daysInMonth + 1;
      month = currentMonth + 1;
      year = currentYear;
      if(month > 11){ month = 0; year++; }
      other = true;
    } else {
      day = i - offset + 1;
      month = currentMonth;
      year = currentYear;
    }

    const key = dateKey(year, month, day);
    const today = isToday(year, month, day);
    const selected = key === selectedDate;
    const dayEvents = events[key] || [];

    let cls = 'day-cell';
    if(other) cls += ' other-month';
    if(today) cls += ' today';
    if(selected) cls += ' selected';

    let dotsHtml = '';
    if(dayEvents.length > 0 && dayEvents.length <= 3){
      dotsHtml = '<div class="event-dots">' + dayEvents.map(e=>`<div class="event-dot" style="background:${e.color}"></div>`).join('') + '</div>';
    } else if(dayEvents.length > 3){
      dotsHtml = '<div class="event-dots">' + dayEvents.slice(0,2).map(e=>`<div class="event-dot" style="background:${e.color}"></div>`).join('') + `<div class="event-dot" style="background:var(--text3)"></div></div>`;
    }

    html += `<div class="${cls}" onclick="selectDate('${key}',${year},${month},${day})"><div class="day-num">${day}</div>${dotsHtml}</div>`;
  }
  grid.innerHTML = html;
}

function renderMiniMonth(){
  const label = document.getElementById('miniLabel');
  label.textContent = `${miniYear}年${miniMonth+1}月`;

  const grid = document.getElementById('miniGrid');
  let html = WEEKDAYS.map(w=>`<div class="mini-wd">${w.charAt(1)}</div>`).join('');

  const firstDay = new Date(miniYear, miniMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(miniYear, miniMonth+1, 0).getDate();
  const prevDays = new Date(miniYear, miniMonth, 0).getDate();

  for(let i=0; i<42; i++){
    let day, month, year, other = false;
    if(i < offset){
      day = prevDays - offset + i + 1;
      month = miniMonth - 1; year = miniYear;
      if(month<0){month=11;year--;}
      other = true;
    } else if(i >= offset + daysInMonth){
      day = i - offset - daysInMonth + 1;
      month = miniMonth + 1; year = miniYear;
      if(month>11){month=0;year++;}
      other = true;
    } else {
      day = i - offset + 1; month = miniMonth; year = miniYear;
    }
    const key = dateKey(year, month, day);
    const today = isToday(year, month, day);
    const selected = key === selectedDate;
    const hasEvent = events[key] && events[key].length > 0;

    let cls = 'mini-day';
    if(other) cls += ' other';
    if(today) cls += ' today';
    if(selected && !today) cls += ' selected';
    if(hasEvent) cls += ' has-event';

    html += `<div class="${cls}" onclick="miniClick(${year},${month},${day})">${day}</div>`;
  }
  grid.innerHTML = html;
}

function renderPanel(){
  const parts = selectedDate.split('-');
  const y = parseInt(parts[0]), m = parseInt(parts[1])-1, d = parseInt(parts[2]);
  const date = new Date(y, m, d);
  const wd = WEEKDAYS[date.getDay()===0?6:date.getDay()-1];

  document.getElementById('panelDate').textContent = `${m+1}月${d}日`;
  document.getElementById('panelWeekday').textContent = `${y}年 · ${wd}`;

  const list = document.getElementById('panelList');
  const dayEvents = events[selectedDate] || [];
  if(dayEvents.length === 0){
    list.innerHTML = `<div class="no-events"><span>📭</span>暂无事件</div>`;
    return;
  }

  const sorted = [...dayEvents].sort((a,b)=>a.time.localeCompare(b.time));
  list.innerHTML = sorted.map((ev,i)=>
    `<div class="event-card" style="border-left-color:${ev.color}">
      <div class="ev-title">${escHtml(ev.title)}</div>
      <div class="ev-time">🕐 ${ev.time}</div>
      <button class="ev-delete" onclick="deleteEvent(${i})" title="删除">✕</button>
    </div>`
  ).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function selectDate(key, y, m, d){
  selectedDate = key;
  if(m !== currentMonth || y !== currentYear){
    const dir = (y > currentYear || (y === currentYear && m > currentMonth)) ? 1 : -1;
    currentYear = y; currentMonth = m;
    const grid = document.getElementById('daysGrid');
    grid.classList.remove('slide-left','slide-right');
    void grid.offsetWidth;
    grid.classList.add(dir > 0 ? 'slide-left' : 'slide-right');
  }
  render();
}

function navMonth(dir){
  currentMonth += dir;
  if(currentMonth > 11){currentMonth=0;currentYear++;}
  if(currentMonth < 0){currentMonth=11;currentYear--;}
  const grid = document.getElementById('daysGrid');
  grid.classList.remove('slide-left','slide-right');
  void grid.offsetWidth;
  grid.classList.add(dir > 0 ? 'slide-left' : 'slide-right');
  render();
}

function miniNav(dir){
  miniMonth += dir;
  if(miniMonth>11){miniMonth=0;miniYear++;}
  if(miniMonth<0){miniMonth=11;miniYear--;}
  renderMiniMonth();
}

function miniClick(y,m,d){
  selectedDate = dateKey(y,m,d);
  if(m !== currentMonth || y !== currentYear){
    const dir = (y > currentYear || (y === currentYear && m > currentMonth)) ? 1 : -1;
    currentYear = y; currentMonth = m;
    const grid = document.getElementById('daysGrid');
    grid.classList.remove('slide-left','slide-right');
    void grid.offsetWidth;
    grid.classList.add(dir > 0 ? 'slide-left' : 'slide-right');
  }
  render();
}

function goToday(){
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  selectedDate = dateKey(currentYear, currentMonth, now.getDate());
  miniYear = currentYear; miniMonth = currentMonth;
  render();
}

function openModal(){
  document.getElementById('evTitle').value = '';
  document.getElementById('evTime').value = '09:00';
  selectedColor = COLORS[0].value;
  buildColorPicker();
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(()=>document.getElementById('evTitle').focus(), 200);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
}

function saveEvent(){
  const title = document.getElementById('evTitle').value.trim();
  const time = document.getElementById('evTime').value;
  if(!title){document.getElementById('evTitle').style.borderColor='var(--red)';setTimeout(()=>document.getElementById('evTitle').style.borderColor='',1500);return;}
  if(!events[selectedDate]) events[selectedDate] = [];
  events[selectedDate].push({title, time, color: selectedColor});
  saveEvents();
  closeModal();
  render();
}

function deleteEvent(index){
  if(!events[selectedDate]) return;
  events[selectedDate].splice(index, 1);
  if(events[selectedDate].length === 0) delete events[selectedDate];
  saveEvents();
  render();
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && document.getElementById('modalOverlay').classList.contains('active')) saveEvent();
});

init();
</script>
</body>
</html>
