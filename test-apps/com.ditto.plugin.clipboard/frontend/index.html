<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { padding: 16px; border-bottom: 1px solid #313244; flex-shrink: 0; }
    .header h1 { font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .header h1 span { color: #89b4fa; }

    .search-bar { display: flex; gap: 8px; }
    .search-bar input { flex: 1; background: #313244; border: 1px solid #45475a; border-radius: 8px; padding: 8px 12px; color: #cdd6f4; font-size: 13px; outline: none; }
    .search-bar input:focus { border-color: #89b4fa; }
    .search-bar input::placeholder { color: #6c7086; }

    .filter-bar { display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid #313244; flex-shrink: 0; overflow-x: auto; }
    .filter-tag { padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; border: 1px solid #45475a; background: transparent; color: #a6adc8; white-space: nowrap; transition: all 0.15s; }
    .filter-tag:hover { border-color: #89b4fa; color: #89b4fa; }
    .filter-tag.active { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; }

    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-bottom: 1px solid #313244; flex-shrink: 0; }
    .toolbar .count { font-size: 12px; color: #6c7086; }
    .toolbar .clear-btn { background: transparent; border: 1px solid #f38ba8; color: #f38ba8; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .toolbar .clear-btn:hover { background: #f38ba8; color: #1e1e2e; }

    .clip-list { flex: 1; overflow-y: auto; padding: 8px; }
    .clip-list::-webkit-scrollbar { width: 6px; }
    .clip-list::-webkit-scrollbar-track { background: transparent; }
    .clip-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

    .clip-item { background: #313244; border: 1px solid #45475a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; position: relative; }
    .clip-item:hover { border-color: #89b4fa; }
    .clip-item.pinned { border-color: #f9e2af; }
    .clip-item.pinned::before { content: "📌"; position: absolute; top: 6px; right: 32px; font-size: 10px; }

    .clip-content { font-size: 13px; line-height: 1.4; color: #cdd6f4; word-break: break-all; max-height: 54px; overflow: hidden; transition: max-height 0.2s; }
    .clip-content.expanded { max-height: 200px; overflow-y: auto; }

    .clip-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .clip-meta .time { font-size: 11px; color: #6c7086; }
    .clip-meta .tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
    .tag-text { background: rgba(137,180,250,0.2); color: #89b4fa; }
    .tag-link { background: rgba(166,227,161,0.2); color: #a6e3a1; }
    .tag-code { background: rgba(203,166,247,0.2); color: #cba6f7; }

    .clip-actions { position: absolute; top: 6px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .clip-item:hover .clip-actions { opacity: 1; }
    .clip-actions button { background: #45475a; border: none; color: #cdd6f4; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .clip-actions button:hover { background: #585b70; }
    .clip-actions button.pin-btn:hover { background: #f9e2af; color: #1e1e2e; }
    .clip-actions button.del-btn:hover { background: #f38ba8; color: #1e1e2e; }

    .empty-state { text-align: center; padding: 40px 20px; color: #6c7086; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #a6e3a1; color: #1e1e2e; padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .confirm-overlay.show { display: flex; }
    .confirm-dialog { background: #313244; border: 1px solid #45475a; border-radius: 12px; padding: 24px; text-align: center; min-width: 260px; }
    .confirm-dialog p { margin-bottom: 16px; font-size: 14px; }
    .confirm-dialog .btn-row { display: flex; gap: 8px; justify-content: center; }
    .confirm-dialog button { padding: 8px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    .confirm-dialog .cancel-btn { background: #45475a; color: #cdd6f4; }
    .confirm-dialog .confirm-btn { background: #f38ba8; color: #1e1e2e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 <span>剪贴板管理器</span></h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索剪贴板内容..." oninput="renderList()">
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-tag active" data-filter="all" onclick="setFilter(this)">全部</button>
    <button class="filter-tag" data-filter="text" onclick="setFilter(this)">📝 文本</button>
    <button class="filter-tag" data-filter="link" onclick="setFilter(this)">🔗 链接</button>
    <button class="filter-tag" data-filter="code" onclick="setFilter(this)">💻 代码</button>
    <button class="filter-tag" data-filter="pinned" onclick="setFilter(this)">📌 已固定</button>
  </div>

  <div class="toolbar">
    <span class="count" id="clipCount">0 条记录</span>
    <button class="clear-btn" onclick="showClearConfirm()">清空全部</button>
  </div>

  <div class="clip-list" id="clipList"></div>

  <div class="toast" id="toast"></div>

  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
      <p>确定要清空所有剪贴板记录吗？</p>
      <div class="btn-row">
        <button class="cancel-btn" onclick="hideClearConfirm()">取消</button>
        <button class="confirm-btn" onclick="clearAll()">确定清空</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ditto_clipboard_history';
    let currentFilter = 'all';

    function getClips() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveClips(clips) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(clips));
    }

    function detectCategory(text) {
      if (/^https?:\/\//i.test(text.trim())) return 'link';
      if (/[{}\[\]();]/.test(text) && /function|const|let|var|import|class|return|=>/.test(text)) return 'code';
      return 'text';
    }

    function addClip(text) {
      if (!text.trim()) return;
      const clips = getClips();
      clips.unshift({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        text: text.trim(),
        category: detectCategory(text),
        pinned: false,
        timestamp: Date.now()
      });
      saveClips(clips);
      renderList();
    }

    function deleteClip(id) {
      const clips = getClips().filter(c => c.id !== id);
      saveClips(clips);
      renderList();
    }

    function togglePin(id) {
      const clips = getClips();
      const clip = clips.find(c => c.id === id);
      if (clip) clip.pinned = !clip.pinned;
      saveClips(clips);
      renderList();
    }

    function copyClip(id) {
      const clip = getClips().find(c => c.id === id);
      if (!clip) return;
      navigator.clipboard.writeText(clip.text).then(() => {
        showToast('已复制到剪贴板');
      }).catch(() => {
        showToast('复制失败');
      });
    }

    function toggleExpand(el) {
      el.classList.toggle('expanded');
    }

    function setFilter(btn) {
      document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderList();
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return `${mm}-${dd} ${hh}:${mi}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderList() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      let clips = getClips();

      if (currentFilter === 'pinned') {
        clips = clips.filter(c => c.pinned);
      } else if (currentFilter !== 'all') {
        clips = clips.filter(c => c.category === currentFilter);
      }

      if (query) {
        clips = clips.filter(c => c.text.toLowerCase().includes(query));
      }

      const pinned = clips.filter(c => c.pinned);
      const unpinned = clips.filter(c => !c.pinned);
      const sorted = [...pinned, ...unpinned];

      document.getElementById('clipCount').textContent = `${sorted.length} 条记录`;

      const list = document.getElementById('clipList');

      if (sorted.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无剪贴板记录</p></div>';
        return;
      }

      list.innerHTML = sorted.map(clip => {
        const tagClass = `tag-${clip.category}`;
        const tagLabel = clip.category === 'text' ? '文本' : clip.category === 'link' ? '链接' : '代码';
        const isLong = clip.text.length > 80;
        return `
          <div class="clip-item${clip.pinned ? ' pinned' : ''}" data-id="${clip.id}">
            <div class="clip-content${isLong ? '' : ' expanded'}" onclick="toggleExpand(this)">${escapeHtml(clip.text)}</div>
            <div class="clip-meta">
              <span class="time">${formatTime(clip.timestamp)}</span>
              <span class="tag ${tagClass}">${tagLabel}</span>
            </div>
            <div class="clip-actions">
              <button title="复制" onclick="event.stopPropagation();copyClip('${clip.id}')">📋</button>
              <button class="pin-btn" title="${clip.pinned ? '取消固定' : '固定'}" onclick="event.stopPropagation();togglePin('${clip.id}')">📌</button>
              <button class="del-btn" title="删除" onclick="event.stopPropagation();deleteClip('${clip.id}')">✕</button>
            </div>
          </div>`;
      }).join('');
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1500);
    }

    function showClearConfirm() {
      if (getClips().length === 0) return;
      document.getElementById('confirmOverlay').classList.add('show');
    }

    function hideClearConfirm() {
      document.getElementById('confirmOverlay').classList.remove('show');
    }

    function clearAll() {
      localStorage.removeItem(STORAGE_KEY);
      hideClearConfirm();
      renderList();
      showToast('已清空所有记录');
    }

    function initDemoData() {
      if (getClips().length > 0) return;
      const demoClips = [
        { text: 'https://github.com/niceditto/webos', category: 'link' },
        { text: 'function greet(name) {\n  return `你好, ${name}!`;\n}', category: 'code' },
        { text: 'Ditto WebOS 是一个基于 Web 技术的桌面操作系统框架，支持主题、插件和沙盒应用。', category: 'text' },
        { text: 'npm install @ditto/webos --save', category: 'code' },
        { text: 'https://developer.mozilla.org/zh-CN/', category: 'link' },
        { text: '今天的会议纪要：1. 确认新版本发布时间 2. 讨论主题系统架构 3. 分配插件开发任务', category: 'text' },
        { text: 'const theme = await ditto.themes.getCurrent();', category: 'code' },
        { text: 'https://catppuccin.com/palette', category: 'link' }
      ];
      const clips = demoClips.map((d, i) => ({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6) + i,
        text: d.text,
        category: d.category,
        pinned: i < 2,
        timestamp: Date.now() - i * 3600000
      }));
      saveClips(clips);
    }

    initDemoData();
    renderList();

    document.addEventListener('paste', (e) => {
      const text = e.clipboardData.getData('text');
      if (text) addClip(text);
    });
  </script>
</body>
</html>
