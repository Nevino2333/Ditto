<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditto Draw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1e1e2e;--surface:#2a2a3c;--surface2:#353549;--border:#45475a;
  --text:#cdd6f4;--text2:#a6adc8;--accent:#89b4fa;--accent2:#74c7ec;
  --red:#f38ba8;--green:#a6e3a1;--yellow:#f9e2af;--peach:#fab387;
  --mauve:#cba6f7;--pink:#f5c2e7;--teal:#94e2d5;--sky:#89dceb;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:6px 10px;flex-shrink:0;flex-wrap:wrap}
.toolbar-group{display:flex;align-items:center;gap:3px;background:var(--surface2);border-radius:8px;padding:3px 4px}
.toolbar-divider{width:1px;height:28px;background:var(--border);margin:0 4px;flex-shrink:0}
.tool-btn{width:34px;height:34px;border:none;border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.tool-btn:hover{background:rgba(137,180,250,.15);color:var(--text)}
.tool-btn.active{background:var(--accent);color:var(--bg);box-shadow:0 0 8px rgba(137,180,250,.3)}
.tool-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tool-btn.active svg{stroke:var(--bg)}
.color-palette{display:flex;align-items:center;gap:3px;padding:0 2px}
.color-swatch{width:22px;height:22px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:var(--text);box-shadow:0 0 6px rgba(137,180,250,.4)}
.color-picker-wrap{position:relative;width:22px;height:22px;flex-shrink:0}
.color-picker-wrap input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.color-picker-visual{width:22px;height:22px;border-radius:5px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);pointer-events:none}
.slider-group{display:flex;align-items:center;gap:6px;padding:0 4px}
.slider-group label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:24px;text-align:right}
.slider-group input[type=range]{-webkit-appearance:none;width:80px;height:4px;border-radius:2px;background:var(--border);outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 4px rgba(137,180,250,.3)}
.slider-group .val{font-size:11px;color:var(--accent);min-width:28px;text-align:center;font-variant-numeric:tabular-nums}
.action-btn{height:30px;padding:0 10px;border:none;border-radius:6px;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.action-btn:hover{background:rgba(137,180,250,.15);color:var(--text)}
.action-btn:disabled{opacity:.35;cursor:default}
.action-btn.danger:hover{background:rgba(243,139,168,.15);color:var(--red)}
.action-btn.primary{background:var(--accent);color:var(--bg)}
.action-btn.primary:hover{background:var(--accent2)}
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.canvas-wrap canvas{position:absolute;top:0;left:0}
#previewCanvas{pointer-events:none}
.status-bar{background:var(--surface);border-top:1px solid var(--border);padding:3px 12px;display:flex;align-items:center;gap:16px;font-size:11px;color:var(--text2);flex-shrink:0}
.status-bar span{font-variant-numeric:tabular-nums}
.cursor-pen{cursor:crosshair}
.cursor-eraser{cursor:cell}
.cursor-line,.cursor-rect,.cursor-circle{cursor:crosshair}
.cursor-fill{cursor:pointer}
</style>
</head>
<body>
<div class="toolbar">
  <div class="toolbar-group" id="toolGroup">
    <button class="tool-btn active" data-tool="pen" title="画笔 (B)">
      <svg><path d="M3 17l4-4 3 3-4 4-3-1z"/><path d="M7 13l7-7 3 3-7 7z"/></svg>
    </button>
    <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
      <svg><path d="M5 13l6-6 5 5-6 6-5-1z"/><path d="M11 7l5 5"/><line x1="3" y1="19" x2="18" y2="19"/></svg>
    </button>
    <button class="tool-btn" data-tool="line" title="直线 (L)">
      <svg><line x1="4" y1="16" x2="16" y2="4"/></svg>
    </button>
    <button class="tool-btn" data-tool="rect" title="矩形 (R)">
      <svg><rect x="3" y="3" width="14" height="14" rx="1"/></svg>
    </button>
    <button class="tool-btn" data-tool="circle" title="圆形 (C)">
      <svg><circle cx="10" cy="10" r="7"/></svg>
    </button>
    <button class="tool-btn" data-tool="fill" title="填充 (G)">
      <svg><path d="M4 14l4-8 6 6-4 4z"/><path d="M14 12l3 5-2 1-3-5"/><path d="M8 6l-3-2"/></svg>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <div class="color-palette" id="colorPalette">
    <div class="color-swatch active" data-color="#cdd6f4" style="background:#cdd6f4"></div>
    <div class="color-swatch" data-color="#1e1e2e" style="background:#1e1e2e;border:1px solid var(--border)"></div>
    <div class="color-swatch" data-color="#f38ba8" style="background:#f38ba8"></div>
    <div class="color-swatch" data-color="#fab387" style="background:#fab387"></div>
    <div class="color-swatch" data-color="#f9e2af" style="background:#f9e2af"></div>
    <div class="color-swatch" data-color="#a6e3a1" style="background:#a6e3a1"></div>
    <div class="color-swatch" data-color="#94e2d5" style="background:#94e2d5"></div>
    <div class="color-swatch" data-color="#89b4fa" style="background:#89b4fa"></div>
    <div class="color-swatch" data-color="#cba6f7" style="background:#cba6f7"></div>
    <div class="color-swatch" data-color="#f5c2e7" style="background:#f5c2e7"></div>
    <div class="color-swatch" data-color="#e64553" style="background:#e64553"></div>
    <div class="color-swatch" data-color="#fe640b" style="background:#fe640b"></div>
    <div class="color-picker-wrap">
      <div class="color-picker-visual">+</div>
      <input type="color" id="customColor" value="#89b4fa">
    </div>
  </div>

  <div class="toolbar-divider"></div>

  <div class="slider-group">
    <label>粗细</label>
    <input type="range" id="brushSize" min="1" max="50" value="3">
    <span class="val" id="brushSizeVal">3</span>
  </div>

  <div class="slider-group">
    <label>透明</label>
    <input type="range" id="opacity" min="5" max="100" value="100">
    <span class="val" id="opacityVal">100%</span>
  </div>

  <div class="toolbar-divider"></div>

  <button class="action-btn" id="undoBtn" disabled title="撤销 (Ctrl+Z)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    撤销
  </button>
  <button class="action-btn" id="redoBtn" disabled title="重做 (Ctrl+Y)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
    重做
  </button>

  <div class="toolbar-divider"></div>

  <button class="action-btn danger" id="clearBtn" title="清空画布">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    清空
  </button>
  <button class="action-btn primary" id="saveBtn" title="保存为PNG">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    保存
  </button>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="mainCanvas"></canvas>
  <canvas id="previewCanvas"></canvas>
</div>

<div class="status-bar">
  <span id="statusCoord">X: 0 Y: 0</span>
  <span id="statusSize">画布: 0 × 0</span>
  <span id="statusTool">工具: 画笔</span>
</div>

<script>
(function(){
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  const mainCanvas = $('#mainCanvas');
  const previewCanvas = $('#previewCanvas');
  const ctx = mainCanvas.getContext('2d');
  const pctx = previewCanvas.getContext('2d');
  const wrap = $('#canvasWrap');

  let currentTool = 'pen';
  let currentColor = '#cdd6f4';
  let brushSize = 3;
  let opacity = 1;
  let isDrawing = false;
  let startX = 0, startY = 0;
  let lastX = 0, lastY = 0;
  let points = [];

  const undoStack = [];
  const redoStack = [];
  const MAX_HISTORY = 40;

  const toolNames = {pen:'画笔',eraser:'橡皮擦',line:'直线',rect:'矩形',circle:'圆形',fill:'填充'};

  function resizeCanvas(){
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    if(w === 0 || h === 0) return;
    let imgData = null;
    if(mainCanvas.width > 0 && mainCanvas.height > 0){
      try{ imgData = ctx.getImageData(0, 0, mainCanvas.width, mainCanvas.height); }catch(e){}
    }
    mainCanvas.width = w;
    mainCanvas.height = h;
    previewCanvas.width = w;
    previewCanvas.height = h;
    ctx.fillStyle = '#1e1e2e';
    ctx.fillRect(0, 0, w, h);
    if(imgData) ctx.putImageData(imgData, 0, 0);
    $('#statusSize').textContent = '画布: ' + w + ' × ' + h;
  }

  function saveState(){
    if(undoStack.length >= MAX_HISTORY) undoStack.shift();
    undoStack.push(mainCanvas.toDataURL());
    redoStack.length = 0;
    updateUndoRedo();
  }

  function updateUndoRedo(){
    $('#undoBtn').disabled = undoStack.length === 0;
    $('#redoBtn').disabled = redoStack.length === 0;
  }

  function undo(){
    if(undoStack.length === 0) return;
    redoStack.push(mainCanvas.toDataURL());
    const data = undoStack.pop();
    const img = new Image();
    img.onload = function(){
      ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
      ctx.fillStyle = '#1e1e2e';
      ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
      ctx.drawImage(img, 0, 0);
      updateUndoRedo();
    };
    img.src = data;
  }

  function redo(){
    if(redoStack.length === 0) return;
    undoStack.push(mainCanvas.toDataURL());
    const data = redoStack.pop();
    const img = new Image();
    img.onload = function(){
      ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
      ctx.fillStyle = '#1e1e2e';
      ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
      ctx.drawImage(img, 0, 0);
      updateUndoRedo();
    };
    img.src = data;
  }

  function getPos(e){
    const rect = mainCanvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function setupCtx(c, isEraser){
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.lineWidth = brushSize;
    if(isEraser){
      c.globalCompositeOperation = 'destination-out';
      c.globalAlpha = 1;
      c.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      c.globalCompositeOperation = 'source-over';
      c.globalAlpha = opacity;
      c.strokeStyle = currentColor;
      c.fillStyle = currentColor;
    }
  }

  function drawSmoothLine(c, pts){
    if(pts.length < 2) return;
    c.beginPath();
    c.moveTo(pts[0].x, pts[0].y);
    if(pts.length === 2){
      c.lineTo(pts[1].x, pts[1].y);
    } else {
      for(let i = 1; i < pts.length - 1; i++){
        const mx = (pts[i].x + pts[i+1].x) / 2;
        const my = (pts[i].y + pts[i+1].y) / 2;
        c.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
      }
      const last = pts[pts.length - 1];
      c.lineTo(last.x, last.y);
    }
    c.stroke();
  }

  function floodFill(sx, sy, fillColor){
    const w = mainCanvas.width;
    const h = mainCanvas.height;
    const imgData = ctx.getImageData(0, 0, w, h);
    const data = imgData.data;
    sx = Math.round(sx);
    sy = Math.round(sy);
    if(sx < 0 || sx >= w || sy < 0 || sy >= h) return;
    const idx = (sy * w + sx) * 4;
    const sr = data[idx], sg = data[idx+1], sb = data[idx+2], sa = data[idx+3];
    const tmp = document.createElement('canvas');
    tmp.width = 1; tmp.height = 1;
    const tc = tmp.getContext('2d');
    tc.fillStyle = fillColor;
    tc.globalAlpha = opacity;
    tc.fillRect(0,0,1,1);
    const fd = tc.getImageData(0,0,1,1).data;
    const fr = fd[0], fg = fd[1], fb = fd[2], fa = fd[3];
    if(sr === fr && sg === fg && sb === fb && sa === fa) return;
    const tolerance = 30;
    function match(i){
      return Math.abs(data[i]-sr) <= tolerance &&
             Math.abs(data[i+1]-sg) <= tolerance &&
             Math.abs(data[i+2]-sb) <= tolerance &&
             Math.abs(data[i+3]-sa) <= tolerance;
    }
    const stack = [[sx, sy]];
    const visited = new Uint8Array(w * h);
    while(stack.length > 0){
      const [cx, cy] = stack.pop();
      const ci = cy * w + cx;
      if(cx < 0 || cx >= w || cy < 0 || cy >= h) continue;
      if(visited[ci]) continue;
      const pi = ci * 4;
      if(!match(pi)) continue;
      visited[ci] = 1;
      data[pi] = fr;
      data[pi+1] = fg;
      data[pi+2] = fb;
      data[pi+3] = fa;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(imgData, 0, 0);
  }

  function onPointerDown(e){
    e.preventDefault();
    const pos = getPos(e);
    isDrawing = true;
    startX = pos.x;
    startY = pos.y;
    lastX = pos.x;
    lastY = pos.y;
    points = [pos];

    if(currentTool === 'fill'){
      saveState();
      floodFill(pos.x, pos.y, currentColor);
      isDrawing = false;
      return;
    }

    if(currentTool === 'pen' || currentTool === 'eraser'){
      saveState();
      setupCtx(ctx, currentTool === 'eraser');
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }
  }

  function onPointerMove(e){
    const pos = getPos(e);
    $('#statusCoord').textContent = 'X: ' + Math.round(pos.x) + ' Y: ' + Math.round(pos.y);
    if(!isDrawing) return;
    e.preventDefault();

    if(currentTool === 'pen' || currentTool === 'eraser'){
      points.push(pos);
      setupCtx(ctx, currentTool === 'eraser');
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      const mx = (lastX + pos.x) / 2;
      const my = (lastY + pos.y) / 2;
      ctx.quadraticCurveTo(lastX, lastY, mx, my);
      ctx.stroke();
      lastX = pos.x;
      lastY = pos.y;
    } else if(currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle'){
      pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      setupCtx(pctx, false);
      pctx.beginPath();
      if(currentTool === 'line'){
        pctx.moveTo(startX, startY);
        pctx.lineTo(pos.x, pos.y);
        pctx.stroke();
      } else if(currentTool === 'rect'){
        const x = Math.min(startX, pos.x);
        const y = Math.min(startY, pos.y);
        const w = Math.abs(pos.x - startX);
        const h = Math.abs(pos.y - startY);
        pctx.strokeRect(x, y, w, h);
      } else if(currentTool === 'circle'){
        const cx = (startX + pos.x) / 2;
        const cy = (startY + pos.y) / 2;
        const rx = Math.abs(pos.x - startX) / 2;
        const ry = Math.abs(pos.y - startY) / 2;
        pctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        pctx.stroke();
      }
    }
  }

  function onPointerUp(e){
    if(!isDrawing) return;
    isDrawing = false;

    if(currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle'){
      const pos = e.changedTouches ? getPos(e.changedTouches[0]) : getPos(e);
      saveState();
      setupCtx(ctx, false);
      ctx.beginPath();
      if(currentTool === 'line'){
        ctx.moveTo(startX, startY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
      } else if(currentTool === 'rect'){
        const x = Math.min(startX, pos.x);
        const y = Math.min(startY, pos.y);
        const w = Math.abs(pos.x - startX);
        const h = Math.abs(pos.y - startY);
        ctx.strokeRect(x, y, w, h);
      } else if(currentTool === 'circle'){
        const cx = (startX + pos.x) / 2;
        const cy = (startY + pos.y) / 2;
        const rx = Math.abs(pos.x - startX) / 2;
        const ry = Math.abs(pos.y - startY) / 2;
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    }

    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    points = [];
  }

  mainCanvas.addEventListener('mousedown', onPointerDown);
  mainCanvas.addEventListener('mousemove', onPointerMove);
  mainCanvas.addEventListener('mouseup', onPointerUp);
  mainCanvas.addEventListener('mouseleave', onPointerUp);
  mainCanvas.addEventListener('touchstart', onPointerDown, {passive:false});
  mainCanvas.addEventListener('touchmove', onPointerMove, {passive:false});
  mainCanvas.addEventListener('touchend', onPointerUp);

  $$('#toolGroup .tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('#toolGroup .tool-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTool = btn.dataset.tool;
      mainCanvas.className = 'cursor-' + currentTool;
      $('#statusTool').textContent = '工具: ' + toolNames[currentTool];
    });
  });

  $$('#colorPalette .color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      $$('#colorPalette .color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      currentColor = sw.dataset.color;
    });
  });

  $('#customColor').addEventListener('input', function(){
    currentColor = this.value;
    $$('#colorPalette .color-swatch').forEach(s => s.classList.remove('active'));
  });

  $('#brushSize').addEventListener('input', function(){
    brushSize = parseInt(this.value);
    $('#brushSizeVal').textContent = brushSize;
  });

  $('#opacity').addEventListener('input', function(){
    opacity = parseInt(this.value) / 100;
    $('#opacityVal').textContent = this.value + '%';
  });

  $('#undoBtn').addEventListener('click', undo);
  $('#redoBtn').addEventListener('click', redo);

  $('#clearBtn').addEventListener('click', function(){
    if(!confirm('确定要清空画布吗？')) return;
    saveState();
    ctx.fillStyle = '#1e1e2e';
    ctx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
  });

  $('#saveBtn').addEventListener('click', function(){
    const link = document.createElement('a');
    link.download = 'ditto-draw-' + Date.now() + '.png';
    link.href = mainCanvas.toDataURL('image/png');
    link.click();
  });

  document.addEventListener('keydown', function(e){
    if(e.ctrlKey && e.key === 'z'){ e.preventDefault(); undo(); }
    if(e.ctrlKey && e.key === 'y'){ e.preventDefault(); redo(); }
    if(!e.ctrlKey && !e.altKey){
      const map = {b:'pen',e:'eraser',l:'line',r:'rect',c:'circle',g:'fill'};
      if(map[e.key]){
        const btn = document.querySelector('[data-tool="'+map[e.key]+'"]');
        if(btn) btn.click();
      }
    }
  });

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  saveState();
  mainCanvas.className = 'cursor-pen';
  $('#statusTool').textContent = '工具: 画笔';
})();
</script>
</body>
</html>
