<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditto Code</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-main:#1e1e1e;--bg-sidebar:#252526;--bg-tab:#2d2d2d;--bg-tab-active:#1e1e1e;
  --bg-titlebar:#323233;--bg-input:#3c3c3c;--bg-hover:#2a2d2e;--bg-active:#37373d;
  --bg-console:#1e1e1e;--bg-statusbar:#007acc;--bg-explorer:#252526;
  --text-primary:#d4d4d4;--text-secondary:#808080;--text-muted:#6e6e6e;
  --border:#3c3c3c;--accent:#007acc;--scrollbar:#424242;--scrollbar-hover:#4f4f4f;
  --line-number:#858585;--line-active:#c6c6c6;--line-bg:#2a2d2e;
  --selection:#264f78;--bracket:#ffd700;
  --hl-keyword:#569cd6;--hl-string:#ce9178;--hl-number:#b5cea8;
  --hl-comment:#6a9955;--hl-function:#dcdcaa;--hl-type:#4ec9b0;
  --hl-tag:#569cd6;--hl-attr:#9cdcfe;--hl-value:#ce9178;--hl-punct:#808080;
  --hl-property:#9cdcfe;--hl-selector:#d7ba7d;--hl-builtin:#4ec9b0;
  --hl-decorator:#dcdcaa;--hl-operator:#d4d4d4;--hl-class:#4ec9b0;
}
html,body{height:100%;overflow:hidden;background:var(--bg-main);color:var(--text-primary);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
#app{display:flex;flex-direction:column;height:100%}
.titlebar{display:flex;align-items:center;height:32px;background:var(--bg-titlebar);padding:0 8px;user-select:none;flex-shrink:0}
.titlebar .logo{font-size:14px;margin-right:8px}
.titlebar .title{color:var(--text-primary);font-size:12px;opacity:.8}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg-explorer);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .15s}
.sidebar.collapsed{width:0;border-right:none}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-header button{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:3px}
.sidebar-header button:hover{background:var(--bg-hover);color:var(--text-primary)}
.file-list{flex:1;overflow-y:auto;padding:4px 0}
.file-item{display:flex;align-items:center;padding:4px 12px 4px 20px;cursor:pointer;font-size:13px;color:var(--text-primary);position:relative}
.file-item:hover{background:var(--bg-hover)}
.file-item.active{background:var(--bg-active)}
.file-item .file-icon{margin-right:6px;font-size:12px}
.file-item .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .file-close{display:none;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;margin-left:4px}
.file-item:hover .file-close{display:block}
.file-item .file-close:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.editor-area{display:flex;flex-direction:column;flex:1;overflow:hidden}
.tab-bar{display:flex;align-items:stretch;height:35px;background:var(--bg-tab);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:0}
.tab{display:flex;align-items:center;padding:0 12px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-right:1px solid var(--border);min-width:0;max-width:160px;position:relative;flex-shrink:0}
.tab:hover{background:var(--bg-hover)}
.tab.active{background:var(--bg-tab-active);color:var(--text-primary);border-bottom:1px solid var(--accent);margin-bottom:-1px}
.tab .tab-icon{margin-right:6px;font-size:12px}
.tab .tab-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab .tab-modified{color:var(--text-secondary);margin-left:4px;font-size:10px}
.tab .tab-close{display:flex;align-items:center;justify-content:center;width:18px;height:18px;background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;border-radius:3px;margin-left:6px;flex-shrink:0;opacity:0}
.tab:hover .tab-close,.tab.active .tab-close{opacity:1}
.tab .tab-close:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.tab-new{display:flex;align-items:center;justify-content:center;width:35px;cursor:pointer;color:var(--text-secondary);flex-shrink:0}
.tab-new:hover{background:var(--bg-hover);color:var(--text-primary)}
.toolbar{display:flex;align-items:center;height:30px;background:var(--bg-main);border-bottom:1px solid var(--border);padding:0 8px;flex-shrink:0;gap:8px}
.toolbar select{background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:12px;cursor:pointer;outline:none}
.toolbar select:focus{border-color:var(--accent)}
.toolbar .spacer{flex:1}
.toolbar button{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:12px}
.toolbar button:hover{background:var(--bg-hover);color:var(--text-primary)}
.editor-container{flex:1;display:flex;overflow:hidden;position:relative}
.line-numbers{width:50px;background:var(--bg-main);color:var(--line-number);font-family:'Consolas','Fira Code','Courier New',monospace;font-size:14px;line-height:20px;padding:8px 0;text-align:right;user-select:none;overflow:hidden;flex-shrink:0}
.line-numbers .line-num{padding-right:12px;display:block}
.line-numbers .line-num.active{color:var(--line-active)}
.code-wrapper{flex:1;position:relative;overflow:hidden}
.code-highlight{position:absolute;top:0;left:0;right:0;bottom:0;padding:8px 12px;font-family:'Consolas','Fira Code','Courier New',monospace;font-size:14px;line-height:20px;color:var(--text-primary);white-space:pre;overflow:auto;pointer-events:none;z-index:1}
.code-highlight::-webkit-scrollbar{width:10px;height:10px}
.code-highlight::-webkit-scrollbar-track{background:var(--bg-main)}
.code-highlight::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:5px}
.code-highlight::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}
.code-textarea{position:absolute;top:0;left:0;width:100%;height:100%;padding:8px 12px;font-family:'Consolas','Fira Code','Courier New',monospace;font-size:14px;line-height:20px;color:transparent;caret-color:#aeafad;background:transparent;border:none;outline:none;resize:none;overflow:auto;z-index:2;white-space:pre;tab-size:2;-moz-tab-size:2}
.code-textarea::selection{background:var(--selection)}
.code-textarea::-webkit-scrollbar{width:10px;height:10px}
.code-textarea::-webkit-scrollbar-track{background:var(--bg-main)}
.code-textarea::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:5px}
.code-textarea::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}
.console-panel{border-top:1px solid var(--border);background:var(--bg-console);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:height .15s}
.console-panel.collapsed{height:0!important;border-top:none}
.console-header{display:flex;align-items:center;height:28px;padding:0 8px;background:var(--bg-tab);border-bottom:1px solid var(--border);flex-shrink:0}
.console-header .console-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);flex:1}
.console-header button{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px}
.console-header button:hover{background:var(--bg-hover);color:var(--text-primary)}
.console-output{flex:1;overflow-y:auto;padding:8px 12px;font-family:'Consolas','Fira Code','Courier New',monospace;font-size:12px;line-height:18px}
.console-output::-webkit-scrollbar{width:8px}
.console-output::-webkit-scrollbar-track{background:var(--bg-console)}
.console-output::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}
.console-line{margin-bottom:2px;word-break:break-all}
.console-line.error{color:#f44747}
.console-line.warn{color:#cca700}
.console-line.info{color:#3794ff}
.console-line.result{color:#b5cea8}
.console-input-row{display:flex;align-items:center;padding:4px 8px;border-top:1px solid var(--border);flex-shrink:0}
.console-input-row .prompt{color:var(--accent);margin-right:6px;font-family:'Consolas','Fira Code','Courier New',monospace;font-size:12px}
.console-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);font-family:'Consolas','Fira Code','Courier New',monospace;font-size:12px}
.statusbar{display:flex;align-items:center;height:22px;background:var(--bg-statusbar);padding:0 8px;flex-shrink:0;gap:12px}
.statusbar span{font-size:11px;color:#fff;opacity:.9}
.statusbar .spacer{flex:1}
.bracket-match{background:rgba(255,215,0,.25);outline:1px solid var(--bracket);border-radius:2px}
.hl-keyword{color:var(--hl-keyword)}
.hl-string{color:var(--hl-string)}
.hl-number{color:var(--hl-number)}
.hl-comment{color:var(--hl-comment);font-style:italic}
.hl-function{color:var(--hl-function)}
.hl-type{color:var(--hl-type)}
.hl-tag{color:var(--hl-tag)}
.hl-attr{color:var(--hl-attr)}
.hl-value{color:var(--hl-value)}
.hl-punct{color:var(--hl-punct)}
.hl-property{color:var(--hl-property)}
.hl-selector{color:var(--hl-selector)}
.hl-builtin{color:var(--hl-builtin)}
.hl-decorator{color:var(--hl-decorator)}
.hl-operator{color:var(--hl-operator)}
.hl-class{color:var(--hl-class)}
.empty-state{display:flex;align-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);font-size:14px;gap:8px}
.empty-state .shortcut{font-size:12px;color:var(--text-secondary);margin-top:12px}
.empty-state .shortcut kbd{background:var(--bg-input);padding:2px 6px;border-radius:3px;border:1px solid var(--border);font-size:11px;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="titlebar">
    <span class="logo">💻</span>
    <span class="title">Ditto Code</span>
  </div>
  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>资源管理器</span>
        <button onclick="createNewFile()" title="新建文件">+</button>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
    <div class="editor-area">
      <div class="tab-bar" id="tabBar">
        <div class="tab-new" onclick="createNewFile()" title="新建文件">+</div>
      </div>
      <div class="toolbar">
        <button onclick="toggleSidebar()" title="切换侧栏">☰</button>
        <select id="langSelect" onchange="changeLanguage(this.value)">
          <option value="javascript">JavaScript</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="python">Python</option>
        </select>
        <div class="spacer"></div>
        <button onclick="runCode()" title="运行代码 (Ctrl+Enter)">▶ 运行</button>
        <button onclick="saveCurrentFile()" title="保存 (Ctrl+S)">💾 保存</button>
      </div>
      <div class="editor-container" id="editorContainer">
        <div class="line-numbers" id="lineNumbers"></div>
        <div class="code-wrapper">
          <pre class="code-highlight" id="codeHighlight"></pre>
          <textarea class="code-textarea" id="codeTextarea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
      <div class="console-panel" id="consolePanel" style="height:160px">
        <div class="console-header">
          <span class="console-title">控制台</span>
          <button onclick="clearConsole()" title="清除">🗑</button>
          <button onclick="toggleConsole()" title="切换控制台">▼</button>
        </div>
        <div class="console-output" id="consoleOutput"></div>
        <div class="console-input-row">
          <span class="prompt">›</span>
          <input class="console-input" id="consoleInput" placeholder="输入 JavaScript 表达式..." />
        </div>
      </div>
    </div>
  </div>
  <div class="statusbar">
    <span id="statusLang">JavaScript</span>
    <span id="statusCursor">行 1, 列 1</span>
    <div class="spacer"></div>
    <span id="statusFiles">0 个文件</span>
    <span>UTF-8</span>
  </div>
</div>

<script>
const STORAGE_KEY = 'ditto-code-files';
const STATE_KEY = 'ditto-code-state';

let files = [];
let activeFileId = null;
let fileCounter = 0;

const textarea = document.getElementById('codeTextarea');
const highlight = document.getElementById('codeHighlight');
const lineNumbers = document.getElementById('lineNumbers');
const tabBar = document.getElementById('tabBar');
const fileList = document.getElementById('fileList');
const langSelect = document.getElementById('langSelect');
const consoleOutput = document.getElementById('consoleOutput');
const consoleInput = document.getElementById('consoleInput');

const defaultSnippets = {
  javascript: `// 欢迎使用 Ditto Code 🎉\nfunction greet(name) {\n  console.log("你好, " + name + "!");\n}\n\ngreet("世界");\n`,
  html: `<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n  <meta charset="UTF-8">\n  <title>我的页面</title>\n</head>\n<body>\n  <h1>你好，世界！</h1>\n  <p>这是一个示例页面。</p>\n</body>\n</html>\n`,
  css: `/* 样式表 */\nbody {\n  font-family: sans-serif;\n  margin: 0;\n  padding: 20px;\n  background: #1e1e1e;\n  color: #d4d4d4;\n}\n\nh1 {\n  color: #569cd6;\n  border-bottom: 1px solid #3c3c3c;\n  padding-bottom: 8px;\n}\n`,
  python: `# 欢迎使用 Ditto Code 🎉\ndef greet(name):\n    print(f"你好, {name}!")\n\nclass Calculator:\n    def add(self, a, b):\n        return a + b\n\ngreet("世界")\ncalc = Calculator()\nprint(calc.add(2, 3))\n`
};

function getFileExt(lang) {
  return { javascript: '.js', html: '.html', css: '.css', python: '.py' }[lang] || '.txt';
}

function getFileIcon(lang) {
  return { javascript: '📜', html: '🌐', css: '🎨', python: '🐍' }[lang] || '📄';
}

function createNewFile(lang) {
  lang = lang || 'javascript';
  fileCounter++;
  const id = 'file_' + Date.now() + '_' + fileCounter;
  const file = {
    id,
    name: '未命名' + fileCounter + getFileExt(lang),
    language: lang,
    content: defaultSnippets[lang] || '',
    modified: false
  };
  files.push(file);
  switchToFile(id);
  renderTabs();
  renderFileList();
  updateStatus();
  saveState();
}

function switchToFile(id) {
  if (activeFileId && activeFileId !== id) {
    const prev = getFile(activeFileId);
    if (prev) prev.content = textarea.value;
  }
  activeFileId = id;
  const file = getFile(id);
  if (file) {
    textarea.value = file.content;
    langSelect.value = file.language;
    updateHighlight();
    updateLineNumbers();
    updateCursorStatus();
  }
  renderTabs();
  renderFileList();
  textarea.focus();
}

function closeFile(id, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  const idx = files.findIndex(f => f.id === id);
  if (idx === -1) return;
  files.splice(idx, 1);
  if (activeFileId === id) {
    if (files.length > 0) {
      const nextIdx = Math.min(idx, files.length - 1);
      switchToFile(files[nextIdx].id);
    } else {
      activeFileId = null;
      textarea.value = '';
      updateHighlight();
      updateLineNumbers();
    }
  }
  renderTabs();
  renderFileList();
  updateStatus();
  saveState();
}

function getFile(id) {
  return files.find(f => f.id === id);
}

function getActiveFile() {
  return activeFileId ? getFile(activeFileId) : null;
}

function renderTabs() {
  const newBtn = tabBar.querySelector('.tab-new');
  tabBar.innerHTML = '';
  files.forEach(file => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (file.id === activeFileId ? ' active' : '');
    tab.onclick = () => switchToFile(file.id);
    tab.innerHTML = `<span class="tab-icon">${getFileIcon(file.language)}</span><span class="tab-name">${escHtml(file.name)}</span>${file.modified ? '<span class="tab-modified">●</span>' : ''}<button class="tab-close" title="关闭">×</button>`;
    tab.querySelector('.tab-close').onclick = (e) => closeFile(file.id, e);
    tabBar.appendChild(tab);
  });
  tabBar.appendChild(newBtn || createEl('<div class="tab-new" onclick="createNewFile()" title="新建文件">+</div>'));
}

function renderFileList() {
  fileList.innerHTML = '';
  files.forEach(file => {
    const item = document.createElement('div');
    item.className = 'file-item' + (file.id === activeFileId ? ' active' : '');
    item.onclick = () => switchToFile(file.id);
    item.innerHTML = `<span class="file-icon">${getFileIcon(file.language)}</span><span class="file-name">${escHtml(file.name)}</span><button class="file-close" title="关闭">×</button>`;
    item.querySelector('.file-close').onclick = (e) => closeFile(file.id, e);
    fileList.appendChild(item);
  });
}

function createEl(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstChild;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function changeLanguage(lang) {
  const file = getActiveFile();
  if (file) {
    file.language = lang;
    const oldName = file.name;
    const baseName = oldName.replace(/\.[^.]+$/, '');
    file.name = baseName + getFileExt(lang);
    renderTabs();
    renderFileList();
    updateHighlight();
    updateStatus();
    saveState();
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

function toggleConsole() {
  document.getElementById('consolePanel').classList.toggle('collapsed');
}

function saveCurrentFile() {
  const file = getActiveFile();
  if (file) {
    file.content = textarea.value;
    file.modified = false;
    renderTabs();
    renderFileList();
    saveState();
    logConsole('文件已保存: ' + file.name, 'info');
  }
}

function saveState() {
  const file = getActiveFile();
  if (file) file.content = textarea.value;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
    localStorage.setItem(STATE_KEY, JSON.stringify({ activeFileId, fileCounter }));
  } catch(e) {}
}

function loadState() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    const state = localStorage.getItem(STATE_KEY);
    if (data) {
      files = JSON.parse(data);
      if (state) {
        const s = JSON.parse(state);
        activeFileId = s.activeFileId;
        fileCounter = s.fileCounter || files.length;
      }
      if (files.length > 0) {
        if (!activeFileId || !getFile(activeFileId)) activeFileId = files[0].id;
        const file = getFile(activeFileId);
        textarea.value = file.content;
        langSelect.value = file.language;
        updateHighlight();
        updateLineNumbers();
        renderTabs();
        renderFileList();
        updateStatus();
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function updateHighlight() {
  const code = textarea.value;
  const file = getActiveFile();
  const lang = file ? file.language : langSelect.value;
  highlight.innerHTML = highlightCode(code, lang);
}

function updateLineNumbers() {
  const lines = textarea.value.split('\n').length;
  const cursorLine = getCurrentLine();
  let html = '';
  for (let i = 1; i <= lines; i++) {
    html += `<span class="line-num${i === cursorLine ? ' active' : ''}">${i}</span>`;
  }
  lineNumbers.innerHTML = html;
}

function getCurrentLine() {
  const pos = textarea.selectionStart;
  const text = textarea.value.substring(0, pos);
  return text.split('\n').length;
}

function updateCursorStatus() {
  const pos = textarea.selectionStart;
  const text = textarea.value.substring(0, pos);
  const lines = text.split('\n');
  const line = lines.length;
  const col = lines[lines.length - 1].length + 1;
  document.getElementById('statusCursor').textContent = `行 ${line}, 列 ${col}`;
}

function updateStatus() {
  const file = getActiveFile();
  const langNames = { javascript: 'JavaScript', html: 'HTML', css: 'CSS', python: 'Python' };
  document.getElementById('statusLang').textContent = file ? langNames[file.language] || file.language : '';
  document.getElementById('statusFiles').textContent = files.length + ' 个文件';
}

function highlightCode(code, lang) {
  const esc = escHtml(code);
  switch(lang) {
    case 'javascript': return highlightJS(esc);
    case 'html': return highlightHTML(esc);
    case 'css': return highlightCSS(esc);
    case 'python': return highlightPython(esc);
    default: return esc;
  }
}

function highlightJS(code) {
  const tokens = [];
  const regex = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|((?:"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`))|((?:\b(?:const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|this|class|extends|super|import|export|from|default|async|await|try|catch|finally|throw|typeof|instanceof|in|of|void|delete|yield)\b))|((?:\b(?:true|false|null|undefined|NaN|Infinity)\b))|((?:\b\d+\.?\d*(?:e[+-]?\d+)?\b))/gi;
  let match;
  while ((match = regex.exec(code)) !== null) {
    if (match[1]) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-comment' });
    else if (match[2]) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-string' });
    else if (match[3]) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-keyword' });
    else if (match[4]) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-keyword' });
    else if (match[5]) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-number' });
  }
  const funcRegex = /\b([a-zA-Z_$][\w$]*)\s*(?=\()/g;
  while ((match = funcRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[1].length, cls: 'hl-function' });
  }
  const builtinRegex = /\b(console|document|window|Math|Array|Object|String|Number|Boolean|Date|RegExp|Error|Map|Set|Promise|JSON|parseInt|parseFloat|isNaN|isFinite|encodeURI|decodeURI)\b/g;
  while ((match = builtinRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-builtin' });
  }
  return applyTokens(code, tokens);
}

function highlightHTML(code) {
  const tokens = [];
  const commentRegex = /(&lt;!--[\s\S]*?--&gt;)/g;
  let match;
  while ((match = commentRegex.exec(code)) !== null) {
    tokens.push({ i: match.index, l: match[0].length, cls: 'hl-comment' });
  }
  const tagRegex = /(&lt;\/?)([\w-]+)/g;
  while ((match = tagRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) {
      tokens.push({ i: match.index, l: match[1].length, cls: 'hl-punct' });
      tokens.push({ i: match.index + match[1].length, l: match[2].length, cls: 'hl-tag' });
    }
  }
  const attrRegex = /\b([\w-]+)(=)(&quot;[^&]*&quot;|&#39;[^&]*&#39;)/g;
  while ((match = attrRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) {
      tokens.push({ i: match.index, l: match[1].length, cls: 'hl-attr' });
      tokens.push({ i: match.index + match[1].length, l: match[2].length, cls: 'hl-punct' });
      tokens.push({ i: match.index + match[1].length + match[2].length, l: match[3].length, cls: 'hl-string' });
    }
  }
  return applyTokens(code, tokens);
}

function highlightCSS(code) {
  const tokens = [];
  const commentRegex = /(\/\*[\s\S]*?\*\/)/g;
  let match;
  while ((match = commentRegex.exec(code)) !== null) {
    tokens.push({ i: match.index, l: match[0].length, cls: 'hl-comment' });
  }
  const stringRegex = /((?:"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'))/g;
  while ((match = stringRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-string' });
  }
  const selectorRegex = /([.#][\w-]+|[\w-]+(?=\s*\{))/g;
  while ((match = selectorRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-selector' });
  }
  const propRegex = /\b([\w-]+)(\s*:)/g;
  while ((match = propRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) {
      tokens.push({ i: match.index, l: match[1].length, cls: 'hl-property' });
      tokens.push({ i: match.index + match[1].length, l: match[2].length, cls: 'hl-punct' });
    }
  }
  const numberRegex = /\b(\d+\.?\d*)(px|em|rem|%|vh|vw|s|ms|deg)?\b/g;
  while ((match = numberRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-number' });
  }
  return applyTokens(code, tokens);
}

function highlightPython(code) {
  const tokens = [];
  const commentRegex = /(#.*)/g;
  let match;
  while ((match = commentRegex.exec(code)) !== null) {
    tokens.push({ i: match.index, l: match[0].length, cls: 'hl-comment' });
  }
  const stringRegex = /((?:"""[\s\S]*?"""|'''[\s\S]*?'''|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'))/g;
  while ((match = stringRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-string' });
  }
  const keywordRegex = /\b(def|class|return|if|elif|else|for|while|break|continue|import|from|as|try|except|finally|raise|with|yield|lambda|pass|and|or|not|is|in|True|False|None|global|nonlocal|assert|del)\b/g;
  while ((match = keywordRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-keyword' });
  }
  const builtinRegex = /\b(print|len|range|int|str|float|list|dict|set|tuple|type|isinstance|input|open|super|self|map|filter|zip|enumerate|abs|max|min|sum|round|sorted|reversed|any|all)\b/g;
  while ((match = builtinRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-builtin' });
  }
  const funcRegex = /\b([a-zA-Z_]\w*)\s*(?=\()/g;
  while ((match = funcRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[1].length, cls: 'hl-function' });
  }
  const numberRegex = /\b(\d+\.?\d*)\b/g;
  while ((match = numberRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-number' });
  }
  const decoratorRegex = /(@\w+)/g;
  while ((match = decoratorRegex.exec(code)) !== null) {
    let overlap = false;
    for (const t of tokens) { if (match.index >= t.i && match.index < t.i + t.l) { overlap = true; break; } }
    if (!overlap) tokens.push({ i: match.index, l: match[0].length, cls: 'hl-decorator' });
  }
  return applyTokens(code, tokens);
}

function applyTokens(code, tokens) {
  if (tokens.length === 0) return code;
  tokens.sort((a, b) => a.i - b.i);
  let result = '';
  let last = 0;
  const merged = [];
  let cur = 0;
  while (cur < tokens.length) {
    const t = tokens[cur];
    if (t.i < last) { cur++; continue; }
    merged.push(t);
    last = t.i + t.l;
    cur++;
  }
  last = 0;
  for (const t of merged) {
    if (t.i > last) result += code.substring(last, t.i);
    result += `<span class="${t.cls}">${code.substring(t.i, t.i + t.l)}</span>`;
    last = t.i + t.l;
  }
  if (last < code.length) result += code.substring(last);
  return result;
}

function syncScroll() {
  highlight.scrollTop = textarea.scrollTop;
  highlight.scrollLeft = textarea.scrollLeft;
  lineNumbers.scrollTop = textarea.scrollTop;
}

function handleInput() {
  const file = getActiveFile();
  if (file) {
    file.content = textarea.value;
    if (!file.modified) {
      file.modified = true;
      renderTabs();
      renderFileList();
    }
  }
  updateHighlight();
  updateLineNumbers();
  updateCursorStatus();
}

function handleKeydown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    if (e.shiftKey) {
      const lineStart = textarea.value.lastIndexOf('\n', start - 1) + 1;
      const lineText = textarea.value.substring(lineStart, start);
      if (lineText.startsWith('  ')) {
        textarea.value = textarea.value.substring(0, lineStart) + textarea.value.substring(lineStart + 2);
        textarea.selectionStart = textarea.selectionEnd = start - 2;
      }
    } else {
      textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = start + 2;
    }
    handleInput();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const start = textarea.selectionStart;
    const text = textarea.value;
    const lineStart = text.lastIndexOf('\n', start - 1) + 1;
    const currentLine = text.substring(lineStart, start);
    const indent = currentLine.match(/^(\s*)/)[1];
    const charBefore = text[start - 1];
    let extra = '';
    if (charBefore === '{' || charBefore === '(' || charBefore === '[') {
      extra = '  ';
    }
    const insert = '\n' + indent + extra;
    textarea.value = text.substring(0, start) + insert + text.substring(textarea.selectionEnd);
    textarea.selectionStart = textarea.selectionEnd = start + insert.length;
    handleInput();
  } else if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    saveCurrentFile();
  } else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    runCode();
  }
  highlightBrackets();
}

function highlightBrackets() {
  const pos = textarea.selectionStart;
  const text = textarea.value;
  const brackets = { '(': ')', '[': ']', '{': '}' };
  const closingBrackets = { ')': '(', ']': '[', '}': '{' };
  const char = text[pos];
  const prevChar = text[pos - 1];
  let openPos = -1, closePos = -1;
  if (brackets[char]) {
    openPos = pos;
    closePos = findMatchingBracket(text, pos, char, brackets[char], 1);
  } else if (closingBrackets[char]) {
    closePos = pos;
    openPos = findMatchingBracket(text, pos, char, closingBrackets[char], -1);
  } else if (brackets[prevChar]) {
    openPos = pos - 1;
    closePos = findMatchingBracket(text, pos - 1, prevChar, brackets[prevChar], 1);
  } else if (closingBrackets[prevChar]) {
    closePos = pos - 1;
    openPos = findMatchingBracket(text, pos - 1, prevChar, closingBrackets[prevChar], -1);
  }
  const existing = highlight.querySelectorAll('.bracket-match');
  existing.forEach(el => { el.classList.remove('bracket-match'); });
  if (openPos >= 0 && closePos >= 0) {
    const code = highlight.innerHTML;
    let o = 0, c = 0;
    let charCount = 0;
    for (let i = 0; i < code.length && (o === 0 || c === 0); i++) {
      if (code[i] === '<') {
        const end = code.indexOf('>', i);
        if (end !== -1) i = end;
        continue;
      }
      if (code[i] === '&') {
        const end = code.indexOf(';', i);
        if (end !== -1) { charCount++; i = end; continue; }
      }
      if (charCount === openPos && o === 0) o = i;
      if (charCount === closePos && c === 0) c = i;
      charCount++;
    }
  }
}

function findMatchingBracket(text, pos, open, close, dir) {
  let depth = 1;
  let i = pos + dir;
  while (i >= 0 && i < text.length) {
    if (text[i] === open) depth++;
    else if (text[i] === close) depth--;
    if (depth === 0) return i;
    i += dir;
  }
  return -1;
}

function runCode() {
  const file = getActiveFile();
  if (!file) return;
  if (file.language !== 'javascript') {
    logConsole('仅支持运行 JavaScript 代码', 'warn');
    return;
  }
  logConsole('▶ 运行中...', 'info');
  const originalLog = console.log;
  const originalError = console.error;
  const originalWarn = console.warn;
  console.log = (...args) => logConsole(args.map(formatArg).join(' '), 'result');
  console.error = (...args) => logConsole(args.map(formatArg).join(' '), 'error');
  console.warn = (...args) => logConsole(args.map(formatArg).join(' '), 'warn');
  try {
    const result = eval(file.content);
    if (result !== undefined) logConsole('← ' + formatArg(result), 'result');
  } catch(e) {
    logConsole('❌ ' + e.message, 'error');
  }
  console.log = originalLog;
  console.error = originalError;
  console.warn = originalWarn;
}

function formatArg(arg) {
  if (arg === null) return 'null';
  if (arg === undefined) return 'undefined';
  if (typeof arg === 'object') {
    try { return JSON.stringify(arg, null, 2); } catch(e) { return String(arg); }
  }
  return String(arg);
}

function logConsole(msg, type) {
  type = type || '';
  const line = document.createElement('div');
  line.className = 'console-line' + (type ? ' ' + type : '');
  line.textContent = msg;
  consoleOutput.appendChild(line);
  consoleOutput.scrollTop = consoleOutput.scrollHeight;
}

function clearConsole() {
  consoleOutput.innerHTML = '';
}

function handleConsoleInput(e) {
  if (e.key === 'Enter') {
    const code = consoleInput.value.trim();
    if (!code) return;
    logConsole('› ' + code, '');
    try {
      const result = eval(code);
      if (result !== undefined) logConsole('← ' + formatArg(result), 'result');
    } catch(e) {
      logConsole('❌ ' + e.message, 'error');
    }
    consoleInput.value = '';
  }
}

textarea.addEventListener('input', handleInput);
textarea.addEventListener('keydown', handleKeydown);
textarea.addEventListener('scroll', syncScroll);
textarea.addEventListener('click', () => { updateCursorStatus(); updateLineNumbers(); });
textarea.addEventListener('keyup', () => { updateCursorStatus(); updateLineNumbers(); });
consoleInput.addEventListener('keydown', handleConsoleInput);

window.addEventListener('beforeunload', () => {
  const file = getActiveFile();
  if (file) file.content = textarea.value;
  saveState();
});

if (!loadState()) {
  createNewFile('javascript');
}

updateStatus();
</script>
</body>
</html>
